<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nigeria Crypto Hub — Live NGN & $PROS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #050505; color: #ffffff; font-family: 'Space Grotesk', sans-serif; }
        .glass-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px; }
        .stat-label { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.1rem; color: #888; }
        .live-dot { height: 8px; width: 8px; background-color: #00ff88; border-radius: 50%; display: inline-block; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
    </style>
</head>
<body class="p-4 max-w-lg mx-auto pb-10">

    <header class="flex justify-between items-center py-6">
        <div>
            <h1 class="text-2xl font-bold tracking-tighter">NGN<span class="text-green-500">HUB</span></h1>
            <p class="text-[10px] text-gray-500">POWERED BY ALKALI VENTURE</p>
        </div>
        <div class="flex items-center gap-2 bg-green-950/30 px-3 py-1 rounded-full border border-green-500/20">
            <span class="live-dot"></span>
            <span class="text-[10px] font-bold text-green-500 uppercase">Auto-Updating</span>
        </div>
    </header>

    <div class="glass-card p-6 mb-4 relative overflow-hidden">
        <p class="stat-label">Bitcoin / Naira (NGN)</p>
        <h2 id="btc-price" class="text-3xl font-bold my-2">₦111,377,680</h2>
        <p class="text-[10px] text-gray-500">Real-time P2P Market Rate</p>
    </div>

    <div class="grid grid-cols-2 gap-4 mb-6">
        <div class="glass-card p-4 border-l-4 border-yellow-500">
            <p class="stat-label">Pharos ($PROS)</p>
            <p id="pros-price" class="text-xl font-bold">$0.73</p>
            <p class="text-[10px] text-yellow-600">L1 Mainnet Price</p>
        </div>
        <div class="glass-card p-4 border-l-4 border-blue-500">
            <p class="stat-label">ETH Gas Fee</p>
            <p class="text-xl font-bold">2.8 Gwei</p>
            <p class="text-[10px] text-blue-600">Low/Safe</p>
        </div>
    </div>

    <div class="glass-card p-4 mb-6 text-center">
        <p class="stat-label mb-3">Market Sentiment Index</p>
        <img src="https://alternative.me/crypto/fear-and-greed-index.png" class="rounded-lg border border-gray-800">
    </div>

    <a href="https://www.bybit.com/invite?ref=Z8VPGGR" target="_blank" class="flex justify-between items-center glass-card p-5 border-yellow-500/50 border-2 hover:bg-yellow-500/10 transition-all">
        <div class="flex items-center gap-4">
            <div class="w-12 h-12 bg-yellow-500 rounded-xl flex items-center justify-center text-black font-extrabold text-xl">B</div>
            <div>
                <p class="font-bold text-lg text-yellow-500">Trade on Bybit</p>
                <p class="text-xs text-gray-400">Exclusive for Pharos ($PROS)</p>
            </div>
        </div>
        <span class="text-yellow-500 text-2xl font-bold">→</span>
    </a>

    <script>
        // FUNCTION TO UPDATE PRICES FROM THE INTERNET
        async function updatePrices() {
            try {
                // Fetch BTC and PROS prices
                const response = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,pharos&vs_currencies=usd,ngn');
                const data = await response.json();

                // Update BTC in Naira
                const btcNgn = data.bitcoin.ngn.toLocaleString();
                document.getElementById('btc-price').innerText = "₦" + btcNgn;

                // Update Pharos in USD
                const prosUsd = data.pharos.usd.toFixed(2);
                document.getElementById('pros-price').innerText = "$" + prosUsd;

                console.log("Prices Updated Successfully");
            } catch (error) {
                console.log("Price update failed - will try again");
            }
        }

        // Run every 60 seconds
        setInterval(updatePrices, 60000);
        updatePrices(); // Run immediately on load
    </script>
</body>
</html>
